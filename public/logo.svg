<?xml version="1.0" encoding="UTF-8"?>
<!-- Simple Location Chat logo: pin + chat bubble -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#00d3b0"/>
      <stop offset="100%" stop-color="#00a884"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="20" fill="#051018" />

  <!-- map pin -->
  <g transform="translate(30,12)">
    <path d="M30 0C18.954 0 10 8.954 10 20c0 13 20 40 20 40s20-27 20-40C50 8.954 41.046 0 30 0z" fill="url(#g)"/>
    <circle cx="30" cy="20" r="9" fill="#03110e" />
    <circle cx="30" cy="20" r="4" fill="#fff" opacity="0.92" />
  </g>

  <!-- chat bubble -->
  <g transform="translate(62,62)">
    <path d="M8 0h28a8 8 0 0 1 8 8v16a8 8 0 0 1-8 8H20l-8 8V32H8a8 8 0 0 1-8-8V8A8 8 0 0 1 8 0z" fill="#0f1720" opacity="0.85"/>
    <circle cx="12" cy="12" r="2" fill="#00d3b0" />
    <circle cx="20" cy="12" r="2" fill="#00d3b0" />
    <circle cx="28" cy="12" r="2" fill="#00d3b0" />
  </g>
</svg>
